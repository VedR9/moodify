name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - backend/**
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend/ to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "deploy@moodify.ai"
          git config --global user.name  "Moodify Deploy Bot"

          # Clone the HF Space repo
          git clone https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/moodify-api hf-space

          # Sync backend/ contents into the space (overwrite, keep .git)
          rsync -av --delete \
            --exclude='.git' \
            backend/ hf-space/

          # Commit and push
          cd hf-space
          git add .
          git diff --cached --quiet || git commit -m "sync: backend from GitHub $(date +%Y-%m-%d\ %H:%M)"
          git push
